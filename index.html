<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EPINEON AI | LLM Intelligence Monitor</title>
<meta name="description" content="Real-time LLM monitoring and enterprise recommendation system by EL KHOBZI Ismail"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#03080f;--bg2:#060e1a;--bg3:#0a1628;
  --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
  --border:rgba(0,212,255,0.12);--border2:rgba(0,212,255,0.28);
  --cyan:#00d4ff;--cyan2:#00a8cc;--purple:#7b2fff;--pink:#ff6b9d;
  --gold:#ffd700;--silver:#b8c8d8;--bronze:#cd9060;
  --green:#00ff88;--red:#ff4d6d;--orange:#ff9500;
  --text:#dce8f8;--muted:#6a8aaa;--muted2:#4a6a8a;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;--head:'Orbitron',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}

/* Layout */
.app{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 2rem 4rem}

/* Glass Card */
.card{background:var(--glass);border:1px solid var(--border);border-radius:18px;
  backdrop-filter:blur(24px);transition:border-color .25s,box-shadow .25s}
.card:hover{border-color:var(--border2);box-shadow:0 0 30px rgba(0,212,255,.08)}
.card-pad{padding:1.75rem}

/* Section title */
.section-title{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.section-title h2{font-family:var(--head);font-size:.72rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);font-weight:400}
.section-title::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border2),transparent)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(0,212,255,.3)}50%{box-shadow:0 0 22px rgba(0,212,255,.7)}}

.fade-up{animation:fadeUp .6s ease both}
.fade-in{animation:fadeIn .4s ease both}

/* Header */
.header{text-align:center;padding:3.5rem 0 2.5rem;position:relative}
.header-badge{display:inline-flex;align-items:center;gap:.5rem;
  background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(123,47,255,.08));
  border:1px solid rgba(0,212,255,.2);border-radius:100px;
  padding:.38rem 1.1rem;font-size:.68rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--cyan);margin-bottom:1.6rem;
  animation:fadeUp .5s ease both}
.header h1{font-family:var(--head);font-weight:900;
  font-size:clamp(2.2rem,5.5vw,4.5rem);line-height:1.05;letter-spacing:.04em;
  background:linear-gradient(135deg,#00d4ff 0%,#7b2fff 55%,#ff6b9d 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.9rem;animation:fadeUp .5s .1s ease both}
.header p{color:var(--muted);font-size:.95rem;font-weight:300;
  animation:fadeUp .5s .2s ease both}
.author-tag{display:inline-flex;align-items:center;gap:.7rem;margin-top:1.2rem;
  background:var(--glass2);border:1px solid rgba(255,255,255,.08);
  border-radius:100px;padding:.4rem 1.1rem;font-size:.78rem;
  animation:fadeUp .5s .3s ease both}
.author-tag span{color:var(--muted);font-size:.7rem;letter-spacing:.06em;text-transform:uppercase}
.author-tag strong{color:var(--text);font-weight:600}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.online{background:var(--green);animation:glow 2s ease-in-out infinite}
.status-dot.offline{background:var(--red);animation:pulse 1.5s ease-in-out infinite}

/* Profile pills */
.profile-wrap{animation:fadeUp .5s .35s ease both;margin-bottom:1.5rem}
.profile-row{display:flex;gap:.6rem;flex-wrap:wrap}
.profile-btn{background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.15);
  border-radius:10px;padding:.55rem 1.1rem;color:var(--muted);font-family:var(--font);
  font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.02em}
.profile-btn:hover{border-color:rgba(0,212,255,.4);color:var(--cyan);
  background:rgba(0,212,255,.06)}
.profile-btn.active{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(123,47,255,.15));
  border-color:var(--cyan);color:var(--cyan);font-weight:600;
  box-shadow:0 0 20px rgba(0,212,255,.18)}

/* Stats bar */
.stats-bar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2rem;
  animation:fadeUp .5s .4s ease both}
.stat-chip{background:var(--glass);border:1px solid var(--border);
  border-radius:100px;padding:.38rem 1rem;font-size:.76rem;color:var(--muted);
  display:flex;align-items:center;gap:.4rem}
.stat-chip b{color:var(--cyan);font-weight:600}

/* Podium */
.podium-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;
  margin-bottom:2.5rem;animation:fadeUp .6s .45s ease both}
.model-card{border-radius:20px;padding:1.75rem 1.4rem;text-align:center;
  background:var(--glass);border:1px solid var(--border);cursor:default;
  overflow:hidden;position:relative;transition:border-color .3s,box-shadow .3s,transform .3s}
.model-card.gold{border-color:rgba(255,215,0,.3);
  background:linear-gradient(160deg,rgba(255,215,0,.05) 0%,var(--bg) 80%)}
.model-card.silver{border-color:rgba(184,200,216,.22)}
.model-card.bronze{border-color:rgba(205,144,96,.22)}
.rank-num{position:absolute;top:1rem;right:1rem;font-family:var(--head);
  font-size:.65rem;font-weight:700;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center}
.gold .rank-num{background:linear-gradient(135deg,#ffd700,#ff9500);color:#000;
  box-shadow:0 0 16px rgba(255,215,0,.55)}
.silver .rank-num{background:linear-gradient(135deg,#ccd8e4,#7a9ab0);color:#000}
.bronze .rank-num{background:linear-gradient(135deg,#cd9060,#8b5020);color:#fff}
.score-ring{position:relative;width:90px;height:90px;margin:0 auto 1.3rem}
.score-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;line-height:1}
.ring-score{font-family:var(--head);font-size:1.3rem;font-weight:700}
.gold .ring-score{color:var(--gold)}.silver .ring-score{color:var(--silver)}
.bronze .ring-score{color:var(--bronze)}
.ring-label{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.model-name{font-size:.95rem;font-weight:600;margin-bottom:.35rem;line-height:1.2}
.license-badge{display:inline-block;background:rgba(0,212,255,.07);
  border:1px solid rgba(0,212,255,.14);border-radius:5px;
  padding:.18rem .55rem;font-size:.6rem;color:var(--cyan);
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:.5rem}
.justification{font-size:.64rem;color:var(--muted);font-style:italic;
  line-height:1.45;margin-bottom:1rem;min-height:2.5em}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;text-align:left}
.metric{background:rgba(255,255,255,.025);border-radius:8px;padding:.45rem .6rem}
.metric-key{font-size:.54rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:.15rem}
.metric-val{font-size:.78rem;font-weight:600;font-family:var(--mono)}

/* Table */
.table-wrap{margin-bottom:2.5rem;animation:fadeUp .6s .5s ease both}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0 .35rem;min-width:700px}
thead th{text-align:left;font-size:.6rem;text-transform:uppercase;letter-spacing:.15em;
  color:var(--muted2);padding:.6rem 1rem;font-weight:500;cursor:pointer;user-select:none}
thead th:hover{color:var(--muted)}
tbody tr{background:var(--glass);transition:all .2s}
tbody tr:hover{background:rgba(0,212,255,.04);transform:translateX(3px)}
td{padding:.8rem 1rem;font-size:.82rem;border-top:1px solid var(--border);
  border-bottom:1px solid var(--border)}
td:first-child{border-left:1px solid var(--border);border-radius:12px 0 0 12px;padding-left:1.2rem}
td:last-child{border-right:1px solid var(--border);border-radius:0 12px 12px 0}
.rank-n{font-family:var(--head);font-size:.82rem;color:var(--muted2)}
.score-bar-wrap{display:flex;align-items:center;gap:.6rem}
.score-bar{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  width:0;transition:width .9s cubic-bezier(.4,0,.2,1)}
.score-num{font-family:var(--mono);font-size:.8rem;font-weight:600;
  color:var(--cyan);min-width:36px}
.tag{font-size:.62rem;color:var(--muted);background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:5px;padding:.14rem .45rem}

/* Charts layout */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;
  margin-bottom:2.5rem;animation:fadeUp .6s .55s ease both}
.chart-title{font-family:var(--head);font-size:.65rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);margin-bottom:1.3rem}

/* Comparison */
.comp-wrap{animation:fadeUp .6s .58s ease both;margin-bottom:2.5rem}
.comp-pills{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.3rem}
.comp-pill{background:rgba(123,47,255,.04);border:1px solid rgba(123,47,255,.18);
  border-radius:8px;padding:.35rem .75rem;font-size:.74rem;color:var(--muted);
  cursor:pointer;font-family:var(--font);transition:all .2s}
.comp-pill:hover{border-color:rgba(123,47,255,.5);color:#c4a0ff}
.comp-pill.sel{background:rgba(123,47,255,.15);border-color:var(--purple);
  color:#d4b8ff;font-weight:600}
.comp-hint{font-size:.7rem;color:var(--muted2);margin-bottom:.8rem}

/* Movements */
.mv-wrap{animation:fadeUp .6s .6s ease both;margin-bottom:2.5rem}
.mv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.8rem}
.mv-item{display:flex;align-items:center;gap:.9rem;padding:.9rem 1.1rem;
  background:var(--glass);border:1px solid rgba(255,255,255,.05);
  border-radius:13px;transition:border-color .2s;animation:slideIn .4s ease both}
.mv-item:hover{border-color:rgba(0,212,255,.15)}
.mv-icon{font-size:1.5rem;flex-shrink:0}
.mv-info{flex:1;min-width:0}
.mv-name{font-weight:600;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mv-detail{font-size:.7rem;color:var(--muted)}
.mv-badge{font-size:.63rem;padding:.18rem .6rem;border-radius:6px;font-weight:600;flex-shrink:0}
.badge-new{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.28)}
.badge-drop{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.28)}

/* Report section */
.report-wrap{animation:fadeUp .6s .63s ease both;margin-bottom:2.5rem}
.report-preview{max-height:380px;overflow-y:auto;padding:1.4rem;
  font-family:var(--mono);font-size:.78rem;line-height:1.75;color:var(--muted);
  white-space:pre-wrap;background:rgba(0,0,0,.25);border-radius:12px;
  border:1px solid rgba(255,255,255,.04)}
.report-actions{display:flex;gap:.7rem;margin-top:1rem;flex-wrap:wrap}
.btn{padding:.65rem 1.3rem;border-radius:11px;border:none;
  font-family:var(--font);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .22s}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff}
.btn-primary:hover{box-shadow:0 0 28px rgba(0,212,255,.45);transform:translateY(-2px)}
.btn-secondary{background:var(--glass2);color:var(--muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px)}
.btn-danger{background:rgba(123,47,255,.15);color:#c4a0ff;border:1px solid rgba(123,47,255,.3)}
.btn-danger:hover{background:rgba(123,47,255,.28);transform:translateY(-1px)}

/* Scheduler */
.sched-wrap{animation:fadeUp .6s .65s ease both;margin-bottom:2.5rem}
.sched-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:1.4rem}
.sched-stat{background:var(--glass);border:1px solid var(--border);border-radius:13px;padding:1.1rem 1.3rem}
.sched-stat-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted2);margin-bottom:.35rem}
.sched-stat-val{font-family:var(--mono);font-size:.9rem;font-weight:500;color:var(--text)}
.running-badge{display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.22);
  border-radius:100px;padding:.28rem .7rem;font-size:.68rem;color:var(--green)}
.reports-list{display:flex;flex-direction:column;gap:.5rem;margin-top:.8rem;max-height:200px;overflow-y:auto}
.report-item{display:flex;align-items:center;gap.8rem;padding:.55rem .85rem;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);
  border-radius:9px;font-size:.74rem;gap:.8rem}
.report-item-name{font-family:var(--mono);color:var(--muted);flex:1}
.report-item-size{color:var(--muted2);font-size:.68rem}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4rem;gap:1rem}
.spinner{width:40px;height:40px;border-radius:50%;
  border:3px solid rgba(0,212,255,.08);border-top-color:var(--cyan);
  animation:spin .7s linear infinite}

/* Error */
.error-box{text-align:center;padding:3rem}
.error-box h3{color:var(--red);margin-bottom:.6rem;font-size:1.1rem}
.error-box p{color:var(--muted);font-size:.84rem;margin-bottom:.6rem}
.error-box code{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.2);
  border-radius:6px;padding:.3rem .7rem;font-family:var(--mono);font-size:.8rem;color:var(--red)}

/* Footer */
footer{text-align:center;padding:2rem 0;color:var(--muted2);font-size:.74rem;
  border-top:1px solid rgba(255,255,255,.04);margin-top:1rem}
footer a{color:var(--cyan);text-decoration:none}
footer strong{color:var(--muted)}

/* Toggle */
.toggle-row{display:flex;align-items:center;gap:.8rem;margin-bottom:.6rem}
.toggle{position:relative;width:44px;height:23px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;cursor:pointer;background:rgba(255,255,255,.07);
  border-radius:23px;border:1px solid rgba(255,255,255,.1);transition:.28s}
.slider::before{content:'';position:absolute;width:16px;height:16px;
  left:3px;bottom:2.5px;background:#fff;border-radius:50%;transition:.28s}
input:checked+.slider{background:linear-gradient(135deg,var(--cyan),var(--purple))}
input:checked+.slider::before{transform:translateX(21px)}
.toggle-label{font-size:.8rem;color:var(--muted)}

@media(max-width:900px){
  .podium-grid,.charts-row{grid-template-columns:1fr}
  .app{padding:0 1rem 3rem}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;
const {
  RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis,
  BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,
  ScatterChart,Scatter,ZAxis,Cell,Legend
} = Recharts;

const API = 'http://127.0.0.1:8000';
const CIRC = 2 * Math.PI * 40;
const COLORS = ['#00d4ff','#7b2fff','#ff6b9d','#00ff88','#ffd700'];
const TT_STYLE = {
  backgroundColor:'rgba(4,10,20,.95)',border:'1px solid rgba(0,212,255,.25)',
  borderRadius:'10px',fontFamily:'Space Grotesk',fontSize:'12px',color:'#dce8f8'
};

// ─── Neural Background ────────────────────────────────────────
function useNeuralBg(enabled){
  useEffect(()=>{
    const c=document.getElementById('bg-canvas');
    const x=c.getContext('2d');
    let dots=[],raf;
    const resize=()=>{c.width=innerWidth;c.height=innerHeight};
    resize();addEventListener('resize',resize);
    class D{constructor(){this.reset()}reset(){
      this.px=Math.random()*c.width;this.py=Math.random()*c.height;
      this.vx=(Math.random()-.5)*.3;this.vy=(Math.random()-.5)*.3;
      this.r=Math.random()*1.6+.7;this.a=Math.random()*.4+.08;this.ph=Math.random()*6.28
    }tick(){
      this.px+=this.vx;this.py+=this.vy;this.ph+=.016;
      if(this.px<0||this.px>c.width)this.vx*=-1;
      if(this.py<0||this.py>c.height)this.vy*=-1;
    }draw(){
      x.beginPath();x.arc(this.px,this.py,this.r,0,6.28);
      x.fillStyle=`rgba(0,212,255,${Math.max(0,this.a+Math.sin(this.ph)*.07)})`;x.fill();
    }}
    const n=Math.min(70,~~(innerWidth*innerHeight/13000));
    dots=Array.from({length:n},()=>new D());
    function loop(){
      x.clearRect(0,0,c.width,c.height);
      if(enabled){
        for(let i=0;i<dots.length;i++)for(let j=i+1;j<dots.length;j++){
          const dx=dots[i].px-dots[j].px,dy=dots[i].py-dots[j].py,d=Math.sqrt(dx*dx+dy*dy);
          if(d<130){x.beginPath();x.moveTo(dots[i].px,dots[i].py);x.lineTo(dots[j].px,dots[j].py);
            x.strokeStyle=`rgba(0,212,255,${(1-d/130)*.15})`;x.lineWidth=.5;x.stroke()}
        }
        dots.forEach(p=>{p.tick();p.draw()});
      }
      raf=requestAnimationFrame(loop);
    }
    loop();
    return()=>{cancelAnimationFrame(raf);removeEventListener('resize',resize)};
  },[enabled]);
}

// ─── API Hooks ────────────────────────────────────────────────
function useApi(url,deps=[]){
  const [data,setData]=useState(null);
  const [error,setError]=useState(false);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!url){setLoading(false);return}
    setLoading(true);setError(false);
    fetch(url).then(r=>r.json()).then(d=>{setData(d);setLoading(false)})
      .catch(()=>{setError(true);setLoading(false)});
  },deps);
  return{data,error,loading};
}

// ─── Score Ring ───────────────────────────────────────────────
function ScoreRing({score,rank}){
  const ref=useRef();
  const off=useMemo(()=>CIRC-(score/100)*CIRC,[score]);
  const colors=[[],['url(#gGold)'],['url(#gSilver)'],['url(#gBronze)']];
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    setTimeout(()=>{el.style.strokeDashoffset=off},100);
  },[off]);
  return(
    <div className="score-ring">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <defs>
          <linearGradient id="gGold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#ffd700"/><stop offset="100%" stopColor="#ff9500"/></linearGradient>
          <linearGradient id="gSilver" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#d0d8e4"/><stop offset="100%" stopColor="#7090a8"/></linearGradient>
          <linearGradient id="gBronze" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#cd9060"/><stop offset="100%" stopColor="#8b4520"/></linearGradient>
        </defs>
        <circle className="ring-bg" cx="45" cy="45" r="40"/>
        <circle ref={ref} className="ring-fill" cx="45" cy="45" r="40"
          stroke={colors[rank]||'#00d4ff'}
          strokeDasharray={CIRC} strokeDashoffset={CIRC}/>
      </svg>
      <div className="ring-text">
        <span className="ring-score">{score}</span>
        <span className="ring-label">/ 100</span>
      </div>
    </div>
  );
}

// ─── Podium Card ──────────────────────────────────────────────
function ModelCard({model,rank}){
  const ref=useRef();
  const cls=['','gold','silver','bronze'][rank]||'';
  const handleMove=e=>{
    const r=ref.current.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
    ref.current.style.transform=`perspective(600px) rotateY(${x*13}deg) rotateX(${-y*13}deg) translateY(-8px) scale(1.02)`;
  };
  const handleLeave=()=>{ref.current.style.transform='';};
  return(
    <div ref={ref} className={`model-card ${cls}`} onMouseMove={handleMove} onMouseLeave={handleLeave}>
      <div className="rank-num">{['','1','2','3'][rank]}</div>
      <ScoreRing score={model.score} rank={rank}/>
      <div className="model-name">{model.model_name}</div>
      <div className="license-badge">{model.license}</div>
      <div className="justification">{model.justification}</div>
      <div className="metrics-grid">
        {[
          ['🧠 Intel',model.intelligence_score],
          ['🏟 ELO',model.arena_elo||'N/A'],
          ['💰 Cost',`$${model.cost_per_1m_tokens}/1M`],
          ['⚡ Speed',`${model.speed_tokens_sec} t/s`],
        ].map(([k,v])=>(
          <div className="metric" key={k}>
            <div className="metric-key">{k}</div>
            <div className="metric-val">{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Charts ───────────────────────────────────────────────────
function BarCharts({data}){

  const short=n=>n.length>13?n.slice(0,13)+'…':n;
  return(
    <div className="card card-pad">
      <div className="chart-title">📡 Composite Score — Top 7</div>
      <ResponsiveContainer width="100%" height={220}>
        <BarChart data={top7.map(m=>({name:short(m.model_name),score:m.score}))} margin={{top:4,right:4,left:-20,bottom:0}}>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,.04)"/>
          <XAxis dataKey="name" tick={{fill:'#6a8aaa',fontSize:10,fontFamily:'Space Grotesk'}} axisLine={false} tickLine={false}/>
          <YAxis tick={{fill:'#6a8aaa',fontSize:10}} domain={[50,100]} axisLine={false} tickLine={false}/>
          <Tooltip contentStyle={TT_STYLE}/>
          <Bar dataKey="score" radius={[8,8,0,0]}>
            {top7.map((_,i)=><Cell key={i} fill={i===0?'#00d4ff':i===1?'#7b2fff':'rgba(0,212,255,.55)'}/>)}

function RadarChartComp({data}){
  const dims=['intelligence','arena_elo','cost','speed','latency','context'];
  const labels=['Intel','ELO','Cost','Speed','Latency','Context'];
  const top3=data.slice(0,3);
  const rdata=labels.map((l,i)=>({dim:l,...Object.fromEntries(top3.map((m,j)=>[j,m.breakdown?.[dims[i]]||0]))}));
  return(
    <div className="card card-pad">
      <div className="chart-title">🕸 Multi-Dimension Radar — Top 3</div>
      <ResponsiveContainer width="100%" height={220}>
        <RadarChart data={rdata}>
          <PolarGrid stroke="rgba(255,255,255,.06)"/>
          <PolarAngleAxis dataKey="dim" tick={{fill:'#6a8aaa',fontSize:10,fontFamily:'Space Grotesk'}}/>
          <PolarRadiusAxis domain={[0,100]} tick={false} axisLine={false}/>
          {top3.map((m,i)=>(
            <Radar key={i} name={m.model_name} dataKey={i}
              stroke={COLORS[i]} fill={COLORS[i]} fillOpacity={.07}
              strokeWidth={2} dot={{r:3}}/>
          ))}
          <Legend wrapperStyle={{fontSize:'11px',color:'#6a8aaa',fontFamily:'Space Grotesk'}}/>
          <Tooltip contentStyle={TT_STYLE}/>
        </RadarChart>
      </ResponsiveContainer>
    </div>
  );
}

function BubbleChart({data}){

    <div className="card card-pad">
      <div className="chart-title">💰 Cost vs Intelligence (bubble = speed)</div>
      <ResponsiveContainer width="100%" height={240}>
        <ScatterChart margin={{top:8,right:8,left:-16,bottom:8}}>

// ─── Comparison ───────────────────────────────────────────────
function ModelComparison({data}){
  const [sel,setSel]=useState(new Set());
  const toggle=name=>{
    setSel(prev=>{
      const n=new Set(prev);
      if(n.has(name))n.delete(name);
      else if(n.size<5)n.add(name);
      return n;
    });
  };
  const dims=['intelligence','arena_elo','cost','speed','latency','context'];
  const labels=['Intel','ELO','Cost','Speed','Latency','Context'];
  const selData=data.filter(m=>sel.has(m.model_name));
  const rdata=sel.size>=2?labels.map((l,i)=>({dim:l,...Object.fromEntries(selData.map(m=>[m.model_name,m.breakdown?.[dims[i]]||0]))})):[];
  return(
    <div className="comp-wrap">
      <div className="section-title"><h2>⚔️ Model Comparison</h2></div>
      <div className="card card-pad">
        <div className="comp-hint">Select 2–5 models to compare across all dimensions</div>
        <div className="comp-pills">
          {data.map(m=>(
            <button key={m.model_name} className={`comp-pill${sel.has(m.model_name)?' sel':''}`}
              onClick={()=>toggle(m.model_name)}>{m.model_name}</button>
          ))}
        </div>
        {sel.size>=2?(
          <ResponsiveContainer width="100%" height={280}>
            <RadarChart data={rdata}>
              <PolarGrid stroke="rgba(255,255,255,.06)"/>
              <PolarAngleAxis dataKey="dim" tick={{fill:'#6a8aaa',fontSize:11,fontFamily:'Space Grotesk'}}/>
              <PolarRadiusAxis domain={[0,100]} tick={false} axisLine={false}/>
              {selData.map((m,i)=>(
                <Radar key={i} name={m.model_name} dataKey={m.model_name}
                  stroke={COLORS[i%5]} fill={COLORS[i%5]} fillOpacity={.07} strokeWidth={2} dot={{r:3}}/>
              ))}
              <Legend wrapperStyle={{fontSize:'11px',color:'#6a8aaa',fontFamily:'Space Grotesk'}}/>
              <Tooltip contentStyle={TT_STYLE}/>
            </RadarChart>
          </ResponsiveContainer>
        ):(
          <div style={{textAlign:'center',padding:'2.5rem',color:'var(--muted2)',fontSize:'.82rem'}}>
            Select at least 2 models to see the comparison radar ☝️
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Market Movements ─────────────────────────────────────────
function MarketMovements(){
  const{data,loading}=useApi(`${API}/models/movements`,[]);
  if(loading)return null;
  const items=[
    ...(data?.new_arrivals||[]).map(m=>({type:'new',name:m.name,detail:`First detected ${m.first_seen?new Date(m.first_seen).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'recently'}`})),
    ...(data?.price_drops||[]).map(m=>({type:'drop',name:m.name,detail:`$${m.old_cost} → $${m.new_cost}`})),
  ];
  return(
    <div className="mv-wrap">
      <div className="section-title"><h2>📈 Market Movements</h2></div>
      {items.length===0?(
        <div className="card card-pad" style={{color:'var(--muted)',fontSize:'.85rem'}}>
          ✅ No significant movements detected — all models stable.
          <span style={{display:'block',marginTop:'.4rem',color:'var(--muted2)',fontSize:'.75rem'}}>
            {data?.total_models} models tracked across all providers.
          </span>
        </div>
      ):(
        <div className="mv-grid">
          {items.map((item,i)=>(
            <div className="mv-item" key={i} style={{animationDelay:`${i*40}ms`}}>
              <div className="mv-icon">{item.type==='new'?'✨':'💸'}</div>
              <div className="mv-info">
                <div className="mv-name">{item.name}</div>
                <div className="mv-detail">{item.detail}</div>
              </div>
              <span className={`mv-badge ${item.type==='new'?'badge-new':'badge-drop'}`}>
                {item.type==='new'?'NEW':`-${item.pct}%`}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Report Section ───────────────────────────────────────────
function ReportSection(){
  const [report,setReport]=useState('');
  const [loading,setLoading]=useState(false);
  const gen=async()=>{
    setLoading(true);setReport('');
    try{const r=await fetch(`${API}/report`);setReport(await r.text())}
    catch{setReport('Error: API not reachable.')}
    finally{setLoading(false)};
  };
  const dl=()=>{
    if(!report)return;
    const b=new Blob([report],{type:'text/markdown'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download=`epineon_digest_${new Date().toISOString().slice(0,10)}.md`;
    a.click();
  };
  return(
    <div className="report-wrap">
      <div className="section-title"><h2>📄 Auto-Generated Digest Report</h2></div>
      <div className="card card-pad">
        <div className="report-preview">
          {loading?'⚡ Generating digest...':report||'Click "Generate Report" to create a full analysis digest with Top 5 rankings, market movements, and summary statistics.'}
        </div>
        <div className="report-actions">
          <button className="btn btn-primary" onClick={gen} disabled={loading}>
            {loading?'Generating…':'⚡ Generate Report'}
          </button>
          <button className="btn btn-secondary" onClick={dl} disabled={!report}>📥 Download .md</button>
        </div>
      </div>
    </div>
  );
}

// ─── Scheduler Status ─────────────────────────────────────────
function SchedulerStatus(){
  const[status,setStatus]=useState(null);
  const[triggering,setTriggering]=useState(false);
  const fetch_status=()=>{
    fetch(`${API}/scheduler/status`).then(r=>r.json()).then(setStatus).catch(()=>{});
  };
  useEffect(()=>{fetch_status();const t=setInterval(fetch_status,8000);return()=>clearInterval(t)},[]);
  const trigger=async()=>{
    setTriggering(true);
    try{await fetch(`${API}/scheduler/run`,{method:'POST'});}catch{}
    setTimeout(()=>{setTriggering(false);fetch_status();},2000);
  };
  if(!status)return null;
  const fmt=iso=>{if(!iso)return'—';try{return new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}catch{return iso}};
  return(
    <div className="sched-wrap">
      <div className="section-title"><h2>🤖 Automated Pipeline Status</h2></div>
      <div className="card card-pad">
        <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.2rem',flexWrap:'wrap'}}>
          {status.running&&<span className="running-badge"><span className="status-dot online"/>Pipeline running…</span>}
          <button className="btn btn-danger" onClick={trigger} disabled={triggering||status.running}>
            {triggering?'Triggering…':'▶ Run Now'}
          </button>
          <span style={{fontSize:'.72rem',color:'var(--muted2)'}}>Total runs: <b style={{color:'var(--cyan)'}}>{status.total_runs||0}</b></span>
        </div>
        <div className="sched-grid">
          {[
            ['Status',status.last_status||'—'],
            ['Last Run',fmt(status.last_run)],
            ['Next Run',fmt(status.next_run)],
            ['Reports Saved',status.reports?.length||0],
          ].map(([l,v])=>(
            <div className="sched-stat" key={l}>
              <div className="sched-stat-label">{l}</div>
              <div className="sched-stat-val">{v}</div>
            </div>
          ))}
        </div>
        {status.reports?.length>0&&(
          <>
            <div style={{fontSize:'.65rem',color:'var(--muted2)',textTransform:'uppercase',letterSpacing:'.14em',marginBottom:'.5rem'}}>Recent Reports</div>
            <div className="reports-list">
              {status.reports.map((r,i)=>(
                <div className="report-item" key={i}>
                  <span className="report-item-name">📄 {r.filename}</span>
                  <span className="report-item-size">{r.size_kb} KB</span>
                  <span style={{fontSize:'.68rem',color:'var(--muted2)'}}>{fmt(r.generated)}</span>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────
function App(){
  const [profile,setProfile]=useState(null);
  const [commercial,setCommercial]=useState(false);
  const [neuralBg,setNeuralBg]=useState(true);
  const [recs,setRecs]=useState([]);
  const [recLoading,setRecLoading]=useState(true);
  const [recError,setRecError]=useState(false);
  const [online,setOnline]=useState(false);
  const [profiles,setProfiles]=useState([]);
  const [reportMd,setReportMd]=useState('');

  useNeuralBg(neuralBg);

  // Load profiles once on mount
  useEffect(()=>{
    fetch(`${API}/profiles`)
      .then(r=>r.json())
      .then(d=>{setProfiles(d.profiles);setProfile(d.profiles[0]);setOnline(true)})
      .catch(()=>{setOnline(false);setRecLoading(false);setRecError(true)});
  },[]);

  // Load recommendations when profile or commercial changes
  useEffect(()=>{
    if(!profile)return;
    setRecLoading(true);setRecError(false);
    fetch(`${API}/recommend?profile=${encodeURIComponent(profile)}&commercial=${commercial}&top_k=50`)
      .then(r=>r.json())
      .then(d=>{setRecs(d.recommendations||[]);setRecLoading(false)})
      .catch(()=>{setRecError(true);setRecLoading(false)});
  },[profile,commercial]);

  const sortedRecs=useMemo(()=>[...recs].sort((a,b)=>b.score-a.score),[recs]);
  const CF=v=>v>=1e6?(v/1e6).toFixed(1)+'M':(v/1000).toFixed(0)+'K';

  return(
    <div className="app">
      {/* Header */}
      <header className="header">
        <div className="header-badge">⚡ EPINEON AI Research · Challenge ESITH 2026</div>
        <h1>LLM INTELLIGENCE<br/>MONITOR</h1>
        <p>Real-time scoring · Comparison · Enterprise Recommendations · Auto-Reports</p>
        <div className="author-tag">
          <span className={`status-dot ${online?'online':'offline'}`}/>
          <span>{online?'API Connected':'API Offline'}</span>
          <span style={{color:'rgba(255,255,255,.12)'}}>|</span>
          <span>By</span>
          <strong>EL KHOBZI Ismail</strong>
        </div>
      </header>

      {/* Controls */}
      <div className="profile-wrap">
        <div style={{display:'flex',gap:'2rem',flexWrap:'wrap',alignItems:'flex-end',marginBottom:'1rem'}}>
          <div className="profile-row">
            {profiles.map(p=>(
              <button key={p} className={`profile-btn${p===profile?' active':''}`} onClick={()=>setProfile(p)}>{p}</button>
            ))}
          </div>
          <div>
            <div className="toggle-row">
              <label className="toggle"><input type="checkbox" checked={commercial} onChange={e=>setCommercial(e.target.checked)}/><span className="slider"/></label>
              <span className="toggle-label">Commercial only</span>
            </div>
            <div className="toggle-row">
              <label className="toggle"><input type="checkbox" checked={neuralBg} onChange={e=>setNeuralBg(e.target.checked)}/><span className="slider"/></label>
              <span className="toggle-label">Neural background</span>
            </div>
          </div>
        </div>
      </div>

      {/* Stats bar */}
      <div className="stats-bar">
        {[
          ['Models',sortedRecs.length],
          ['Profile',profile],
          ['Top Score',sortedRecs[0]?.score||'—'],
          ['Arena Leader',sortedRecs[0]?.arena_elo||'—'],
          ['Updated',new Date().toLocaleTimeString()],
        ].map(([k,v])=>(
          <div className="stat-chip" key={k}>{k}: <b>{v}</b></div>
        ))}
      </div>

      {/* Error */}
      {recError&&(
        <div className="card" style={{marginBottom:'2rem'}}>
          <div className="error-box">
            <h3>🔌 API Not Reachable</h3>
            <p>Start the backend first:</p>
            <code>python -m uvicorn main:app --reload</code>
            <p style={{marginTop:'.7rem'}}>Then refresh this page.</p>
          </div>
        </div>
      )}

      {/* Podium */}
      {!recError&&(
        <>
          <div className="section-title"><h2>🏆 Top Recommendations</h2></div>
          {recLoading?(
            <div className="loader"><div className="spinner"/></div>
          ):(
            <div className="podium-grid">
              {sortedRecs.slice(0,3).map((m,i)=><ModelCard key={m.model_name} model={m} rank={i+1}/>)}
            </div>
          )}

          {/* Full Table */}
          {!recLoading&&(
            <div className="table-wrap">
              <div className="section-title"><h2>📋 Full Rankings</h2></div>
              <div className="card" style={{padding:0}}>
                <div className="table-scroll">
                  <table>
                    <thead><tr>
                      {['#','Model','Score','Intel','ELO','Cost/1M','Speed','Context','License'].map(h=>(
                        <th key={h} style={h==='#'?{paddingLeft:'1.2rem'}:{}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {sortedRecs.map((m,i)=>{
                        const max=sortedRecs[0]?.score||1;
                        return(
                          <tr key={m.model_name} style={{animationDelay:`${i*25}ms`}}>
                            <td style={{paddingLeft:'1.2rem'}}><span className="rank-n">{i+1}</span></td>
                            <td style={{fontWeight:600}}>{m.model_name}</td>
                            <td>
                              <div className="score-bar-wrap">
                                <div className="score-bar">
                                  <div className="score-bar-fill" style={{width:`${(m.score/max*100).toFixed(1)}%`}}/>
                                </div>
                                <span className="score-num">{m.score}</span>
                              </div>
                            </td>
                            <td>{m.intelligence_score}</td>
                            <td>{m.arena_elo||'—'}</td>
                            <td>${m.cost_per_1m_tokens}</td>
                            <td>{m.speed_tokens_sec} t/s</td>
                            <td>{CF(m.context_window)}</td>
                            <td><span className="tag">{m.license}</span></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* Charts */}
          {!recLoading&&sortedRecs.length>0&&(
            <>
              <div className="section-title"><h2>📊 Visualizations</h2></div>
              <div className="charts-row">
                <BarCharts data={sortedRecs}/>
                <RadarChartComp data={sortedRecs}/>
              </div>
              <div className="charts-row">
                <BubbleChart data={sortedRecs}/>
                <EloChart data={sortedRecs}/>
              </div>
              <ModelComparison data={sortedRecs}/>
            </>
          )}
        </>
      )}

      <MarketMovements/>
      <ReportSection/>
      <SchedulerStatus/>

      <footer>
        <strong>EPINEON AI</strong> · LLM Intelligence Monitor ·
        Built by <a href="#">EL KHOBZI Ismail</a> · ESITH Technical Challenge 2026<br/>
        <span style={{opacity:.6}}>FastAPI · SQLite · React · Recharts · Chart.js · APScheduler</span>
        <span style={{opacity:.5}}> · Data: Artificial Analysis · LMSYS Arena · HuggingFace · OpenRouter</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
